<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P Stream - Streamer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎮 P2P Stream - Streamer</h1>
      <div class="status-badge" id="status">Disconnected</div>
    </header>

    <main>
      <!-- Connection Setup -->
      <section class="setup-panel" id="setupPanel">
        <h2>Setup</h2>
        <div class="form-group">
          <label>Server URL:</label>
          <input type="text" id="serverUrl" value="ws://localhost:4000" placeholder="ws://localhost:4000">
        </div>
        <div class="form-group">
          <label>Streamer Name:</label>
          <input type="text" id="streamerName" placeholder="My Stream" value="Gaming Stream">
        </div>
        <div class="quality-panel">
          <div class="quality-panel-header">
            <h3>Streaming Profile</h3>
            <span id="profileHint" class="profile-hint">Balanced for most sessions</span>
          </div>
          <div class="form-group">
            <label>Quality Preset:</label>
            <select id="qualityProfile">
              <option value="balanced">Balanced</option>
              <option value="performance">Performance</option>
              <option value="quality">Quality</option>
            </select>
          </div>
          <div class="profile-summary" id="profileSummary">1920x1080 cap, 60 fps target, 16 Mbps cap</div>
        </div>
        <label class="toggle-row" for="includeAudio">
          <span>Include source audio</span>
          <input type="checkbox" id="includeAudio" checked>
        </label>
        <button id="connectBtn" class="btn btn-primary">Connect to Server</button>
      </section>

      <!-- Stream Source Selection -->
      <section class="capture-panel" id="capturePanel" style="display: none;">
        <h2>Select Stream Source</h2>
        <div class="sources-grid" id="sourcesGrid">
          <p>Loading...</p>
        </div>
        <button id="refreshSourcesBtn" class="btn btn-secondary">Refresh Sources</button>
      </section>

      <!-- Active Stream -->
      <section class="stream-panel" id="streamPanel" style="display: none;">
        <h2>Stream Status</h2>
        <div class="stream-info">
          <div class="info-item">
            <span class="label">Profile:</span>
            <span id="activeProfile" class="value">Balanced</span>
          </div>
          <div class="info-item">
            <span class="label">Audio:</span>
            <span id="audioStatus" class="value">Off</span>
          </div>
          <div class="info-item">
            <span class="label">Status:</span>
            <span id="streamStatus" class="value">Idle</span>
          </div>
          <div class="info-item">
            <span class="label">Viewers:</span>
            <span id="viewerCount" class="value">0</span>
          </div>
          <div class="info-item">
            <span class="label">Bitrate:</span>
            <span id="bitrate" class="value">-- Mbps</span>
          </div>
          <div class="info-item">
            <span class="label">FPS:</span>
            <span id="fps" class="value">--</span>
          </div>
        </div>
        <div id="viewersList" class="viewers-list"></div>
        <button id="stopStreamBtn" class="btn btn-danger">Stop Streaming</button>
      </section>

      <!-- Debug Console -->
      <section class="debug-panel">
        <div class="debug-header">
          <h2>🔧 Debug Console</h2>
          <button id="toggleDebug" class="btn btn-small" style="background: #666; color: white; margin-top: 0;">Clear Logs</button>
        </div>
        <div id="debugConsole" class="debug-console"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
